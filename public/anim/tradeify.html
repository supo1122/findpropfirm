<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tradeify · Scale Impact</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background: #02040a;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #fx { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .grid {
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,220,140,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,220,140,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 15%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 15%, transparent 70%);
  }
  .stage {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 28px;
  }
  .logo {
    position: relative;
    width: min(280px, 65vw);
    transform-origin: center center;
    will-change: transform, filter, width;
  }
  .logo img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 28px rgba(0,255,160,0.45));
  }
  .brand {
    font-size: clamp(22px, 4.5vw, 36px);
    font-weight: 800;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
    opacity: 0;
    transform: scale(0.4) translateY(20px);
    will-change: transform, opacity;
    text-shadow: 0 0 30px rgba(0,255,160,0.3);
  }

  /* States */
  .logo.huge { width: min(480px, 88vw); }
  .logo.normal {
    width: min(260px, 58vw);
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .stage.show-text .brand {
    opacity: 1;
    transform: scale(1) translateY(0);
    transition: opacity 0.6s ease 0.25s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
  }
  .logo.punch {
    animation: punch 0.85s cubic-bezier(0.34, 1.55, 0.64, 1) forwards;
  }
  @keyframes punch {
    0%   { transform: scale(1); filter: brightness(1); }
    30%  { transform: scale(1.2); filter: brightness(1.35); }
    65%  { transform: scale(0.95); filter: brightness(1.1); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .logo.breathe {
    animation: breathe 4.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.04); }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <canvas id="fx"></canvas>
  <div class="stage" id="stage">
    <div class="logo huge" id="logo">
      <img id="logoImg" alt="Tradeify">
    </div>
    <div class="brand" id="brand">TRADEIFY</div>
  </div>

document.getElementById('logoImg').src = 'data:image/png;base64,' + LOGO_B64;

const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() {
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize(); addEventListener('resize', resize);

class Particle {
  constructor(x,y,o={}) {
    this.x=x; this.y=y;
    const a = o.angle ?? Math.random()*Math.PI*2;
    const s = o.speed ?? (0.5+Math.random()*1.6);
    this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s;
    this.life=1;
    this.decay = o.decay ?? (0.01+Math.random()*0.012);
    this.size = o.size ?? (1+Math.random()*2);
    this.color = o.color || (Math.random()>0.4 ? 'rgba(0,255,160,0.7)' : 'rgba(100,255,200,0.5)');
  }
  update(){ this.vx*=0.98; this.vy*=0.98; this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; }
  draw(c){
    if(this.life<=0) return;
    c.save(); c.globalAlpha=Math.max(0,this.life*0.75);
    c.fillStyle=this.color; c.beginPath();
    c.arc(this.x,this.y,this.size*this.life,0,Math.PI*2); c.fill(); c.restore();
  }
}
function softBurst(x,y,n=14){
  for(let i=0;i<n;i++) particles.push(new Particle(x,y,{
    speed:0.9+Math.random()*3.2, size:1.1+Math.random()*2.3, decay:0.012+Math.random()*0.01
  }));
}
function ambient(){
  if(Math.random()<0.1){
    const side = Math.random()<0.5 ? -10 : innerWidth+10;
    particles.push(new Particle(side, Math.random()*innerHeight, {
      angle: side<0 ? (Math.random()*0.5-0.25) : Math.PI+(Math.random()*0.5-0.25),
      speed:0.25+Math.random()*0.7, size:0.6+Math.random()*1.3,
      decay:0.002+Math.random()*0.0025,
      color: Math.random()>0.5 ? 'rgba(0,230,150,0.35)' : 'rgba(80,255,200,0.25)'
    }));
  }
}
function getCenter(){
  const r = document.getElementById('logo').getBoundingClientRect();
  return {x: r.left+r.width/2, y: r.top+r.height/2};
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

const logo = document.getElementById('logo');
const stage = document.getElementById('stage');

async function runCycle(){
  // Huge entrance
  logo.className = 'logo huge';
  stage.classList.remove('show-text');
  await wait(180);
  softBurst(...Object.values(getCenter()), 16);
  await wait(1350);

  // Scale down + show brand
  logo.classList.remove('huge');
  logo.classList.add('normal');
  stage.classList.add('show-text');
  await wait(850);
  softBurst(...Object.values(getCenter()), 11);

  // Punch
  await wait(280);
  logo.classList.add('punch');
  await wait(880);
  logo.classList.remove('punch');

  // Breathe
  logo.classList.add('breathe');
  await wait(3100);

  // Expand huge again
  logo.classList.remove('breathe','normal');
  stage.classList.remove('show-text');
  logo.classList.add('huge');
  await wait(1050);
  softBurst(...Object.values(getCenter()), 13);
  await wait(750);

  runCycle();
}

function loop(){
  ctx.clearRect(0,0,innerWidth,innerHeight);
  ambient();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.update(); p.draw(ctx);
    if(p.life<=0) particles.splice(i,1);
  }
  if(particles.length>85) particles.length=85;
  requestAnimationFrame(loop);
}
loop();
setTimeout(runCycle, 300);
</script>
