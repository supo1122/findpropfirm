name: X 最新消息（每小時）

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點
  workflow_dispatch: {}     # 也可在 Actions 頁手動觸發測試

permissions:
  contents: write           # 允許 commit 回 news.json

concurrency:
  group: x-news             # 同時只跑一個，避免兩次執行互相撞
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安裝 twitter-scraper
        run: npm i @the-convocation/twitter-scraper
      - name: 抓取並更新 news.json
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: node scripts/fetch-x.mjs
      - name: Commit 更新
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet public/news.json; then
            echo "news.json 無變化，略過"; exit 0
          fi
          git add public/news.json
          git commit -m "auto: 更新 X 最新消息"
          # 遠端可能有新 commit：重試 pull --rebase（衝突時保留我們剛抓的 news.json）再推
          for i in 1 2 3; do
            git fetch origin main
            git rebase -X theirs origin/main || { git checkout --theirs public/news.json 2>/dev/null; git add public/news.json; git rebase --continue || true; }
            if git push origin main; then echo "推送成功"; break; fi
            echo "重試 $i ..."; sleep 5
          done
