<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCID TRADING · Scale Impact</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#02040a;
    overflow:hidden;
    font-family: system-ui, sans-serif;
  }

  #fx {
    position:fixed; inset:0; z-index:1;
    pointer-events:none;
  }

  .grid {
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(53,224,138,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53,224,138,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 10%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 10%, transparent 70%);
  }

  .stage {
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== Logo assembly ===== */
  .logo {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transform-origin: center center;
    will-change: transform, filter;
  }

  /* Text */
  .text {
    position:relative;
    z-index:5;
    height: 132px;
    margin-left: 28px;
    opacity: 0;
    transform: scale(0.4);
    filter: drop-shadow(0 0 20px rgba(53,224,138,0.0));
    transition: none;
    will-change: transform, opacity, filter;
  }
  .text img {
    height:100%; width:auto; display:block;
    user-select:none; -webkit-user-drag:none;
  }

  /* Ball */
  .ball-wrap {
    position:relative;
    z-index:20;
    width: 148px;
    height: 148px;
    will-change: transform;
  }
  .ball {
    width:100%; height:100%;
    transform-origin: center center;
    will-change: transform, filter;
    filter: drop-shadow(0 0 30px rgba(120,200,255,0.45));
  }
  .ball img {
    width:100%; height:100%;
    display:block;
    border-radius:50%;
  }

  /* Continuous slow elegant spin */
  .ball .spin {
    width:100%; height:100%;
    animation: spinY 9s linear infinite;
    transform-style: preserve-3d;
  }
  @keyframes spinY {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
  }

  /* ===== KEY SCALE STATES (driven by JS classes) ===== */

  /* Intro: ball alone, huge */
  .logo.intro .ball-wrap {
    width: min(420px, 78vw);
    height: min(420px, 78vw);
  }
  .logo.intro .text {
    opacity: 0;
    transform: scale(0.2);
    width: 0;
    margin: 0;
    overflow: hidden;
  }

  /* Assembled normal size */
  .logo.assembled .ball-wrap {
    width: 148px;
    height: 148px;
    transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1),
                height 1.1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .logo.assembled .text {
    opacity: 1;
    transform: scale(1);
    margin-left: 28px;
    transition: opacity 0.7s ease 0.25s,
                transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s,
                filter 0.8s ease 0.3s;
    filter: drop-shadow(0 0 22px rgba(53,224,138,0.4));
  }

  /* Big impact scale punch on whole logo */
  .logo.punch {
    animation: logoPunch 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes logoPunch {
    0%   { transform: scale(1);    filter: brightness(1); }
    35%  { transform: scale(1.22); filter: brightness(1.25); }
    70%  { transform: scale(0.96); filter: brightness(1.05); }
    100% { transform: scale(1);    filter: brightness(1); }
  }

  /* Gentle continuous breathe after settle */
  .logo.breathe {
    animation: breathe 4.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.035); }
  }

  /* When ball is huge (intro / re-impact) */
  .logo.huge .ball-wrap {
    width: min(460px, 85vw) !important;
    height: min(460px, 85vw) !important;
    transition: width 1.25s cubic-bezier(0.16, 1, 0.3, 1),
                height 1.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .logo.huge .text {
    opacity: 0 !important;
    transform: scale(0.15) !important;
    margin-left: 0 !important;
    transition: opacity 0.4s ease, transform 0.6s ease !important;
  }

  /* Soft ring glow during large scale */
  .ball-wrap::after {
    content:'';
    position:absolute;
    inset: -8%;
    border-radius:50%;
    background: radial-gradient(circle, transparent 55%, rgba(53,224,138,0.12) 70%, transparent 80%);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.6s;
  }
  .logo.intro .ball-wrap::after,
  .logo.huge .ball-wrap::after {
    opacity:1;
    animation: ringBreathe 3s ease-in-out infinite;
  }
  @keyframes ringBreathe {
    0%,100% { transform:scale(1); opacity:0.7; }
    50%     { transform:scale(1.08); opacity:1; }
  }

  @media (max-width:600px) {
    .logo.assembled .ball-wrap { width:110px; height:110px; }
    .logo.assembled .text { height:100px; margin-left:18px; }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <canvas id="fx"></canvas>

  <div class="stage">
    <div class="logo intro" id="logo">
      <div class="ball-wrap" id="ballWrap">
        <div class="ball" id="ball">
          <div class="spin">
            <img id="sphereImg" alt="Lucid Sphere">
          </div>
        </div>
      </div>
      <div class="text" id="text">
        <img id="textImg" alt="LUCID TRADING">
      </div>
    </div>
  </div>

document.getElementById('sphereImg').src = 'data:image/png;base64,' + SPHERE_B64;
document.getElementById('textImg').src   = 'data:image/png;base64,' + TEXT_B64;

/* ===== Minimal elegant particles ===== */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
let W, H, dpr, particles = [];

function resize() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  W = canvas.width  = innerWidth * dpr;
  H = canvas.height = innerHeight * dpr;
  canvas.style.width  = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener('resize', resize);

class P {
  constructor(x,y,o={}) {
    this.x=x; this.y=y;
    const a = o.angle ?? Math.random()*Math.PI*2;
    const s = o.speed ?? (0.6 + Math.random()*1.8);
    this.vx = Math.cos(a)*s;
    this.vy = Math.sin(a)*s;
    this.life = 1;
    this.decay = o.decay ?? (0.008 + Math.random()*0.012);
    this.size = o.size ?? (1 + Math.random()*2.2);
    this.color = o.color || (Math.random()>0.5 ? 'rgba(53,224,138,0.75)' : 'rgba(140,210,255,0.6)');
  }
  update() {
    this.vx *= 0.99; this.vy *= 0.99;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw(c) {
    if (this.life<=0) return;
    c.save();
    c.globalAlpha = Math.max(0, this.life*0.85);
    c.fillStyle = this.color;
    c.beginPath();
    c.arc(this.x, this.y, this.size*this.life, 0, Math.PI*2);
    c.fill();
    c.restore();
  }
}

function softBurst(x, y, n=18) {
  for (let i=0; i<n; i++) {
    particles.push(new P(x, y, {
      speed: 1.2 + Math.random()*3.5,
      size: 1.2 + Math.random()*2.5,
      decay: 0.014 + Math.random()*0.012,
      color: Math.random()>0.4 ? 'rgba(53,224,138,0.8)' : 'rgba(180,230,255,0.7)'
    }));
  }
}

function ambient() {
  if (Math.random() < 0.12) {
    const side = Math.random()<0.5 ? -10 : innerWidth+10;
    particles.push(new P(side, Math.random()*innerHeight, {
      angle: side<0 ? (Math.random()*0.5-0.25) : Math.PI+(Math.random()*0.5-0.25),
      speed: 0.3+Math.random()*0.8,
      size: 0.7+Math.random()*1.4,
      decay: 0.0025+Math.random()*0.003,
      color: Math.random()>0.5 ? 'rgba(53,224,138,0.45)' : 'rgba(100,200,255,0.35)'
    }));
  }
}

/* ===== Sequence controller ===== */
const logo = document.getElementById('logo');
const ballWrap = document.getElementById('ballWrap');
let cycle = 0;

function getCenter() {
  const r = ballWrap.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function runCycle() {
  // === PHASE 1: Huge ball entrance (eye grab) ===
  logo.className = 'logo intro';
  await wait(200);

  // Soft particles around huge ball
  const c1 = getCenter();
  softBurst(c1.x, c1.y, 22);

  // Hold the big spinning ball for impact
  await wait(1600);

  // === PHASE 2: Dramatic scale-down + assemble logo ===
  logo.classList.remove('intro');
  logo.classList.add('assembled');

  // Small elegant burst when it snaps into place
  await wait(700);
  const c2 = getCenter();
  softBurst(c2.x, c2.y, 14);

  // === PHASE 3: Strong logo punch scale (the "wow" moment) ===
  await wait(400);
  logo.classList.add('punch');
  await wait(900);
  logo.classList.remove('punch');

  // === PHASE 4: Gentle continuous breathe + hold ===
  logo.classList.add('breathe');
  await wait(3200);

  // === PHASE 5: Scale back to huge for next loop impact ===
  logo.classList.remove('breathe', 'assembled');
  logo.classList.add('huge');

  await wait(1300);

  // Soft particles as it expands again
  const c3 = getCenter();
  softBurst(c3.x, c3.y, 16);

  await wait(900);

  // Ready for next cycle (seamless)
  logo.classList.remove('huge');
  cycle++;
  runCycle();
}

/* ===== Render ===== */
function loop() {
  ctx.clearRect(0,0,innerWidth,innerHeight);
  ambient();
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.update();
    p.draw(ctx);
    if (p.life <= 0) particles.splice(i,1);
  }
  if (particles.length > 120) particles.length = 120; // hard cap, very light
  requestAnimationFrame(loop);
}

/* Start */
loop();
// Small delay then first impact
setTimeout(() => runCycle(), 400);
</script>
