<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX Trader Funding — Brand Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, #020818 0%, #000000 70%);
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(40, 100, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40, 100, 255, 0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse at center, #000 18%, transparent 70%);
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.85; }
    }

    canvas#particles {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .ambient {
      position: absolute;
      width: min(75vw, 620px);
      height: min(75vw, 620px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 100, 255, 0.18) 0%, transparent 62%);
      filter: blur(55px);
      z-index: 2;
      animation: ambientBreath 5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ambientBreath {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(60, 120, 255, 0.14);
      z-index: 3;
      pointer-events: none;
    }
    .ring.r1 {
      width: min(92vw, 780px); height: min(92vw, 780px);
      animation: spin 34s linear infinite;
    }
    .ring.r2 {
      width: min(68vw, 560px); height: min(68vw, 560px);
      border-color: rgba(60, 120, 255, 0.09);
      animation: spin 48s linear infinite reverse;
    }
    .ring.r3 {
      width: min(48vw, 380px); height: min(48vw, 380px);
      border-color: rgba(60, 120, 255, 0.06);
      animation: spin 24s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .ring::before {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: #4a8cff;
      border-radius: 50%;
      box-shadow: 0 0 16px 3px #2a6cff;
      top: 50%; left: -3.5px;
      transform: translateY(-50%);
    }
    .ring.r2::before { width: 5px; height: 5px; opacity: 0.7; }
    .ring.r3::before { width: 4px; height: 4px; opacity: 0.5; left: -2px; }

    /* ===== LOGO ===== */
    .logo-stage {
      position: relative;
      z-index: 10;
      perspective: 1500px;
      transform-style: preserve-3d;
    }

    .logo {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transform-style: preserve-3d;
      transform-origin: center center;
      animation:
        introZoom 2.55s cubic-bezier(0.12, 1, 0.3, 1) forwards,
        breathe 4.5s ease-in-out 2.55s infinite,
        subtle3d 7.5s ease-in-out 2.55s infinite;
    }

    @keyframes introZoom {
      0% {
        opacity: 0;
        transform: scale(2.8) translateZ(180px) rotateX(12deg);
        filter: blur(16px) brightness(2.0);
      }
      40% {
        opacity: 1;
        filter: blur(4px) brightness(1.3);
      }
      80% {
        transform: scale(0.98) translateZ(8px) rotateX(0);
        filter: blur(0) brightness(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateZ(0) rotateX(0);
        filter: blur(0) brightness(1);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.03) translateY(-5px); }
    }

    @keyframes subtle3d {
      0%, 100% { transform: rotateY(-2.8deg) rotateX(1.2deg); }
      50% { transform: rotateY(3.2deg) rotateX(-1.6deg); }
    }

    /* ===== THE MARK (self-rotating / flying element) ===== */
    .mark-wrap {
      position: relative;
      width: min(48vw, 300px);
      height: min(26vw, 160px);
      opacity: 0;
      animation: markIn 1.25s ease 1.35s forwards;
      transform-style: preserve-3d;
      transform-origin: center center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    @keyframes markIn {
      from { opacity: 0; transform: scale(0.4) rotateY(-40deg) translateZ(-60px); filter: blur(10px); }
      to { opacity: 1; transform: scale(1) rotateY(0) translateZ(0); filter: blur(0); }
    }

    .mark {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      filter: drop-shadow(0 0 28px rgba(40, 100, 255, 0.55))
              drop-shadow(0 0 55px rgba(30, 80, 255, 0.28));
      animation: markGlow 3s ease-in-out 2.6s infinite,
                 markFloat 5.5s ease-in-out 2.6s infinite;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: center center;
      display: block;
    }

    @keyframes markGlow {
      0%, 100% {
        filter: drop-shadow(0 0 22px rgba(40, 100, 255, 0.5))
                drop-shadow(0 0 48px rgba(30, 80, 255, 0.22));
      }
      50% {
        filter: drop-shadow(0 0 38px rgba(70, 140, 255, 0.8))
                drop-shadow(0 0 75px rgba(40, 100, 255, 0.45));
      }
    }

    @keyframes markFloat {
      0%, 100% { transform: translateY(0) rotateZ(-1deg) rotateY(0deg); }
      50% { transform: translateY(-6px) rotateZ(1.5deg) rotateY(5deg); }
    }

    /* Text block */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: textIn 1.15s cubic-bezier(0.16,1,0.3,1) 1.75s forwards;
    }
    @keyframes textIn {
      from { opacity: 0; transform: translateY(25px) scale(0.88); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .apex {
      font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
      font-weight: 800;
      font-size: clamp(32px, 7.5vw, 64px);
      letter-spacing: 0.08em;
      color: #ffffff;
      line-height: 1;
      text-transform: uppercase;
      text-shadow:
        0 0 20px rgba(60, 130, 255, 0.45),
        0 0 45px rgba(40, 100, 255, 0.2);
      animation: textGlow 3s ease-in-out 2.9s infinite;
    }

    .trader-funding {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 4.2vw, 34px);
      letter-spacing: 0.18em;
      color: #c8d4f0;
      line-height: 1.1;
      text-transform: uppercase;
      display: flex;
      align-items: baseline;
      gap: 4px;
      text-shadow: 0 0 15px rgba(80, 140, 255, 0.25);
    }

    .tm {
      font-size: 0.5em;
      opacity: 0.8;
      margin-left: 2px;
    }

    .tagline {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: clamp(13px, 2.6vw, 18px);
      letter-spacing: 0.12em;
      color: #7a8ab0;
      margin-top: 8px;
      opacity: 0;
      animation: tagIn 1s ease 2.4s forwards;
    }
    @keyframes tagIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 0.9; transform: translateY(0); }
    }

    @keyframes textGlow {
      0%, 100% {
        text-shadow:
          0 0 16px rgba(60, 130, 255, 0.4),
          0 0 35px rgba(40, 100, 255, 0.18);
      }
      50% {
        text-shadow:
          0 0 28px rgba(90, 160, 255, 0.7),
          0 0 55px rgba(60, 130, 255, 0.35),
          0 0 90px rgba(40, 100, 255, 0.15);
      }
    }

    .underline {
      position: absolute;
      bottom: -14px;
      left: 50%;
      width: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(60,130,255,0.85), transparent);
      border-radius: 2px;
      box-shadow: 0 0 14px rgba(50,120,255,0.6);
      transform: translateX(-50%) scaleX(0);
      animation: underlineIn 1s cubic-bezier(0.16,1,0.3,1) 2.3s forwards;
    }
    @keyframes underlineIn {
      to { transform: translateX(-50%) scaleX(1); }
    }

    @media (max-width: 560px) {
      .mark-wrap { width: 220px; height: 120px; }
      .apex { font-size: 34px; letter-spacing: 0.06em; }
      .trader-funding { font-size: 16px; letter-spacing: 0.12em; }
      .logo { gap: 18px; }
    }
  </style>
</head>

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    class P {
      constructor(early = false) {
        this.reset(early);
      }
      reset(early) {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        const speed = 0.2 + Math.random() * 0.55;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 0.08;
        this.r = Math.random() * 2.5 + 0.5;
        this.a = Math.random() * 0.5 + 0.12;
        this.life = early ? Math.random() * 260 : 0;
        this.max = 180 + Math.random() * 260;
        this.phase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.02 + Math.random() * 0.04;
        this.bright = Math.random() > 0.78;
      }
      step() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        this.phase += this.pulseSpeed;
        if (this.x < -25) this.x = W + 25;
        if (this.x > W + 25) this.x = -25;
        if (this.y < -25) this.y = H + 25;
        if (this.y > H + 25) this.y = -25;
        if (this.life > this.max) this.reset();
      }
      draw() {
        const fade = this.life < 40 ? this.life / 40 :
                     this.life > this.max - 45 ? (this.max - this.life) / 45 : 1;
        const pulse = 0.55 + 0.45 * Math.sin(this.phase);
        const alpha = this.a * fade * pulse;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha})`;
        ctx.fill();
        if (this.r > 1.15 || this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * (this.bright ? 3.6 : 2.7), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha * (this.bright ? 0.2 : 0.12)})`;
          ctx.fill();
        }
        if (this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,220,255,${alpha * 0.9})`;
          ctx.fill();
        }
      }
    }

    const COUNT = Math.min(125, Math.floor(W * H / 12500));
    for (let i = 0; i < COUNT; i++) particles.push(new P(true));

    function connections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = Math.hypot(dx, dy);
          if (d < 125) {
            const s = 1 - d / 125;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${COL.r},${COL.g},${COL.b},${s * 0.13})`;
            ctx.lineWidth = 0.65 + s * 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.step(); p.draw(); });
      connections();
      requestAnimationFrame(loop);
    }
    loop();

    // Strong intro burst
    setTimeout(() => {
      const cx = W / 2, cy = H / 2 - 50;
      for (let i = 0; i < 38; i++) {
        const p = new P();
        p.x = cx + (Math.random() - 0.5) * 50;
        p.y = cy + (Math.random() - 0.5) * 40;
        const ang = Math.random() * Math.PI * 2;
        const sp = 1.5 + Math.random() * 3.2;
        p.vx = Math.cos(ang) * sp;
        p.vy = Math.sin(ang) * sp * 0.85;
        p.r = 1.6 + Math.random() * 2.8;
        p.a = 0.75;
        p.max = 70 + Math.random() * 70;
        p.bright = Math.random() > 0.4;
        particles.push(p);
      }
      setTimeout(() => {
        for (let i = 0; i < 18; i++) {
          const p = new P();
          p.x = cx + (Math.random() - 0.5) * 80;
          p.y = cy + (Math.random() - 0.5) * 60;
          const ang = Math.random() * Math.PI * 2;
          const sp = 0.8 + Math.random() * 1.8;
          p.vx = Math.cos(ang) * sp;
          p.vy = Math.sin(ang) * sp;
          p.r = 1.2 + Math.random() * 2;
          p.a = 0.55;
          p.max = 100 + Math.random() * 50;
          particles.push(p);
        }
      }, 280);
      setTimeout(() => {
        particles = particles.filter(p => p.life < p.max - 6);
        while (particles.length < COUNT) particles.push(new P());
      }, 2000);
    }, 900);
  </script>
</body>
</html>
