<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeDay — Animated Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }
    .stage {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, #071012 0%, #000 75%);
      overflow: hidden;
    }

    /* Tech grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(71,195,199,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(71,195,199,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, #000 15%, transparent 68%);
      animation: gridFade 7s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes gridFade {
      0%,100% { opacity: 0.5; }
      50% { opacity: 0.85; }
    }

    canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

    /* Ambient glow */
    .glow {
      position: absolute;
      width: min(70vw, 560px);
      height: min(70vw, 560px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(71,195,199,0.22) 0%, transparent 62%);
      filter: blur(50px);
      z-index: 2;
      animation: glowBreath 4.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowBreath {
      0%,100% { transform: scale(0.85); opacity: 0.55; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    /* Orbiting rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(71,195,199,0.14);
      z-index: 3;
      pointer-events: none;
    }
    .ring.r1 {
      width: min(92vw, 780px); height: min(92vw, 780px);
      animation: spin 32s linear infinite;
    }
    .ring.r2 {
      width: min(68vw, 560px); height: min(68vw, 560px);
      border-color: rgba(71,195,199,0.09);
      animation: spin 48s linear infinite reverse;
    }
    .ring.r3 {
      width: min(48vw, 380px); height: min(48vw, 380px);
      border-color: rgba(71,195,199,0.06);
      animation: spin 22s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .ring::before {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: #47C3C7;
      border-radius: 50%;
      box-shadow: 0 0 14px 2px #47C3C7;
      top: 50%; left: -3.5px;
      transform: translateY(-50%);
    }
    .ring.r2::before { width: 5px; height: 5px; opacity: 0.75; }
    .ring.r3::before { width: 4px; height: 4px; opacity: 0.55; left: -2px; }

    /* Logo stage */
    .logo-stage {
      position: relative;
      z-index: 10;
      perspective: 1400px;
      transform-style: preserve-3d;
    }

    .logo {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0;
      transform-style: preserve-3d;
      animation:
        introZoom 2.5s cubic-bezier(0.14, 1, 0.34, 1) forwards,
        breathe 4.2s ease-in-out 2.5s infinite,
        subtle3d 7s ease-in-out 2.5s infinite;
    }

    /* BIG zoom sense intro */
    @keyframes introZoom {
      0% {
        opacity: 0;
        transform: scale(3.2) translateZ(280px) rotateX(18deg);
        filter: blur(22px) brightness(2.2);
      }
      35% {
        opacity: 1;
        filter: blur(6px) brightness(1.4);
      }
      75% {
        transform: scale(0.96) translateZ(20px) rotateX(0);
        filter: blur(0) brightness(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateZ(0) rotateX(0);
        filter: blur(0) brightness(1);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.04) translateY(-5px); }
    }

    @keyframes subtle3d {
      0%, 100% { transform: rotateY(-3deg) rotateX(1.5deg); }
      50% { transform: rotateY(3.5deg) rotateX(-2deg); }
    }

    /* === BARS (the self-moving element) === */
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 72px;
      margin-right: 18px;
      opacity: 0;
      animation: barsIn 0.9s ease 1.5s forwards;
    }
    @keyframes barsIn {
      from { opacity: 0; transform: scaleY(0.3); }
      to { opacity: 1; transform: scaleY(1); }
    }

    .bar {
      width: 15px;
      border-radius: 8px;
      background: linear-gradient(180deg, #7eebef 0%, #47C3C7 45%, #2a9ea1 100%);
      box-shadow:
        0 0 14px rgba(71,195,199,0.55),
        0 0 28px rgba(71,195,199,0.25),
        inset 0 1px 0 rgba(255,255,255,0.25);
      transform-origin: bottom center;
      animation: barDance 1.05s ease-in-out infinite;
    }
    .bar:nth-child(1) { height: 32px; animation-duration: 0.98s; animation-delay: 0.00s; }
    .bar:nth-child(2) { height: 48px; animation-duration: 1.12s; animation-delay: 0.12s; }
    .bar:nth-child(3) { height: 64px; animation-duration: 0.92s; animation-delay: 0.24s; }
    .bar:nth-child(4) { height: 78px; animation-duration: 1.08s; animation-delay: 0.06s; }

    @keyframes barDance {
      0%, 100% {
        transform: scaleY(0.48);
        filter: brightness(0.85);
      }
      40% {
        transform: scaleY(1.12);
        filter: brightness(1.25);
      }
      70% {
        transform: scaleY(0.88);
        filter: brightness(1.05);
      }
    }

    /* Text */
    .word {
      display: flex;
      font-family: 'Barlow Semi Condensed', 'Arial Black', 'Helvetica Neue', Impact, sans-serif;
      font-weight: 900;
      font-size: clamp(46px, 10.2vw, 92px);
      letter-spacing: -0.025em;
      line-height: 1;
      user-select: none;
    }
    .trade {
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.15),
        0 2px 8px rgba(0,0,0,0.4);
    }
    .day {
      color: #47C3C7;
      text-shadow:
        0 0 22px rgba(71,195,199,0.55),
        0 0 40px rgba(71,195,199,0.25),
        0 2px 8px rgba(0,0,0,0.3);
      animation: dayGlow 2.8s ease-in-out 2.5s infinite;
    }
    @keyframes dayGlow {
      0%,100% {
        text-shadow:
          0 0 18px rgba(71,195,199,0.45),
          0 0 36px rgba(71,195,199,0.2),
          0 2px 8px rgba(0,0,0,0.3);
      }
      50% {
        text-shadow:
          0 0 32px rgba(71,195,199,0.8),
          0 0 60px rgba(71,195,199,0.4),
          0 0 90px rgba(71,195,199,0.15),
          0 2px 8px rgba(0,0,0,0.3);
      }
    }

    /* Soft underline accent */
    .underline {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #47C3C7, transparent);
      border-radius: 2px;
      box-shadow: 0 0 12px #47C3C7;
      animation: underlineIn 1.1s cubic-bezier(0.16,1,0.3,1) 2.1s forwards;
    }
    @keyframes underlineIn {
      to { transform: translateX(-50%) scaleX(1); }
    }

    /* Responsive */
    @media (max-width: 520px) {
      .bars { height: 48px; gap: 5px; margin-right: 10px; }
      .bar { width: 10px; border-radius: 5px; }
      .bar:nth-child(1) { height: 20px; }
      .bar:nth-child(2) { height: 30px; }
      .bar:nth-child(3) { height: 40px; }
      .bar:nth-child(4) { height: 50px; }
      .word { font-size: 38px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <canvas id="c"></canvas>
    <div class="glow"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

    <div class="logo-stage">
      <div class="logo">
        <div class="bars" aria-hidden="true">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="word">
          <span class="trade">TRADE</span><span class="day">DAY</span>
        </div>
        <div class="underline"></div>
      </div>
    </div>
  </div>

  <script>
    // Elegant particle + connection system
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const COL = { r: 71, g: 195, b: 199 };

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    class P {
      constructor(early = false) {
        this.reset(early);
      }
      reset(early) {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4 - 0.06;
        this.r = Math.random() * 2.1 + 0.5;
        this.a = Math.random() * 0.4 + 0.12;
        this.life = early ? Math.random() * 200 : 0;
        this.max = 220 + Math.random() * 200;
        this.phase = Math.random() * Math.PI * 2;
      }
      step() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        this.phase += 0.025;
        if (this.x < -20) this.x = W + 20;
        if (this.x > W + 20) this.x = -20;
        if (this.y < -20) this.y = H + 20;
        if (this.y > H + 20) this.y = -20;
        if (this.life > this.max) this.reset();
      }
      draw() {
        const fade = this.life < 50 ? this.life / 50 :
                     this.life > this.max - 50 ? (this.max - this.life) / 50 : 1;
        const pulse = 0.65 + 0.35 * Math.sin(this.phase);
        const alpha = this.a * fade * pulse;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha})`;
        ctx.fill();
        if (this.r > 1.3) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * 2.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha * 0.12})`;
          ctx.fill();
        }
      }
    }

    const COUNT = Math.min(100, Math.floor(W * H / 16000));
    for (let i = 0; i < COUNT; i++) particles.push(new P(true));

    function connections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = Math.hypot(dx, dy);
          if (d < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${COL.r},${COL.g},${COL.b},${(1 - d / 120) * 0.11})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.step(); p.draw(); });
      connections();
      requestAnimationFrame(loop);
    }
    loop();

    // Impact burst on intro
    setTimeout(() => {
      const cx = W / 2, cy = H / 2;
      for (let i = 0; i < 22; i++) {
        const p = new P();
        p.x = cx + (Math.random() - 0.5) * 60;
        p.y = cy + (Math.random() - 0.5) * 30;
        const ang = Math.random() * Math.PI * 2;
        const sp = 1.2 + Math.random() * 2.8;
        p.vx = Math.cos(ang) * sp;
        p.vy = Math.sin(ang) * sp;
        p.r = 1.5 + Math.random() * 2.5;
        p.a = 0.75;
        p.max = 70 + Math.random() * 50;
        particles.push(p);
      }
      setTimeout(() => {
        particles = particles.filter(p => p.life < p.max - 10);
        while (particles.length < COUNT) particles.push(new P());
      }, 1800);
    }, 850);
  </script>
</body>
</html>
