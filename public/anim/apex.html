<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX TRADER FUNDING</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background: #02040c;
    overflow: hidden;
  }
  #fx {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }
  .grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,110,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,110,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 10%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 10%, transparent 70%);
  }
  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .logo {
    position: relative;
    width: min(420px, 82vw);
    transform-origin: center center;
    will-change: transform, filter, width;
  }
  .logo img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 40px rgba(0,130,255,0.4));
  }

  /* ===== Scale States ===== */
  .logo.huge {
    width: min(720px, 96vw);
  }
  .logo.normal {
    width: min(400px, 78vw);
    transition: width 1.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .logo.punch {
    animation: punch 0.85s cubic-bezier(0.34, 1.55, 0.64, 1) forwards;
  }
  @keyframes punch {
    0%   { transform: scale(1);    filter: brightness(1); }
    28%  { transform: scale(1.22); filter: brightness(1.4); }
    62%  { transform: scale(0.94); filter: brightness(1.1); }
    100% { transform: scale(1);    filter: brightness(1); }
  }
  .logo.breathe {
    animation: breathe 4.8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <canvas id="fx"></canvas>
  <div class="stage">
    <div class="logo huge" id="logo">
      <img id="logoImg" alt="APEX TRADER FUNDING">
    </div>
  </div>

/* Minimal particles */
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

class Particle {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    const a = opts.angle ?? Math.random() * Math.PI * 2;
    const s = opts.speed ?? (0.6 + Math.random() * 1.8);
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s;
    this.life = 1;
    this.decay = opts.decay ?? (0.01 + Math.random() * 0.012);
    this.size = opts.size ?? (1 + Math.random() * 2.2);
    this.color = opts.color || (Math.random() > 0.4 ? 'rgba(0,140,255,0.7)' : 'rgba(140,200,255,0.5)');
  }
  update() {
    this.vx *= 0.98; this.vy *= 0.98;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
  }
  draw(c) {
    if (this.life <= 0) return;
    c.save();
    c.globalAlpha = Math.max(0, this.life * 0.75);
    c.fillStyle = this.color;
    c.beginPath();
    c.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
}

function softBurst(x, y, n = 16) {
  for (let i = 0; i < n; i++) {
    particles.push(new Particle(x, y, {
      speed: 1 + Math.random() * 3.5,
      size: 1.2 + Math.random() * 2.5,
      decay: 0.012 + Math.random() * 0.012
    }));
  }
}

function ambient() {
  if (Math.random() < 0.1) {
    const side = Math.random() < 0.5 ? -10 : innerWidth + 10;
    particles.push(new Particle(side, Math.random() * innerHeight, {
      angle: side < 0 ? (Math.random() * 0.5 - 0.25) : Math.PI + (Math.random() * 0.5 - 0.25),
      speed: 0.25 + Math.random() * 0.7,
      size: 0.6 + Math.random() * 1.4,
      decay: 0.002 + Math.random() * 0.0025,
      color: Math.random() > 0.5 ? 'rgba(0,120,255,0.35)' : 'rgba(100,180,255,0.25)'
    }));
  }
}

function getCenter() {
  const r = document.getElementById('logo').getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

const logo = document.getElementById('logo');

async function runCycle() {
  // 1. Start huge
  logo.className = 'logo huge';
  await wait(200);
  softBurst(...Object.values(getCenter()), 18);
  await wait(1400);

  // 2. Scale down to normal
  logo.classList.remove('huge');
  logo.classList.add('normal');
  await wait(900);
  softBurst(...Object.values(getCenter()), 12);

  // 3. Strong punch
  await wait(300);
  logo.classList.add('punch');
  await wait(900);
  logo.classList.remove('punch');

  // 4. Breathe
  logo.classList.add('breathe');
  await wait(3200);

  // 5. Expand huge again
  logo.classList.remove('breathe', 'normal');
  logo.classList.add('huge');
  await wait(1100);
  softBurst(...Object.values(getCenter()), 14);
  await wait(800);

  runCycle();
}

function loop() {
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  ambient();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw(ctx);
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 90) particles.length = 90;
  requestAnimationFrame(loop);
}

loop();
setTimeout(runCycle, 280);
</script>
