<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUCID TRADING — Animated Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, #05080f 0%, #000000 70%);
      overflow: hidden;
    }

    /* Subtle grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(160, 170, 190, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(160, 170, 190, 0.03) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, #000 20%, transparent 72%);
      animation: gridFade 9s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridFade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.75; }
    }

    canvas#particles {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Ambient soft light */
    .ambient {
      position: absolute;
      width: min(70vw, 580px);
      height: min(70vw, 580px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180, 190, 210, 0.12) 0%, transparent 65%);
      filter: blur(50px);
      z-index: 2;
      animation: ambientPulse 5.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ambientPulse {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0.9; }
    }

    /* Outer orbit rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(180, 190, 210, 0.1);
      z-index: 3;
      pointer-events: none;
    }
    .ring.r1 {
      width: min(88vw, 740px); height: min(88vw, 740px);
      animation: spin 36s linear infinite;
    }
    .ring.r2 {
      width: min(64vw, 520px); height: min(64vw, 520px);
      border-color: rgba(180, 190, 210, 0.07);
      animation: spin 50s linear infinite reverse;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .ring::before {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: #c8d0e0;
      border-radius: 50%;
      box-shadow: 0 0 14px 2px #a0a8b8;
      top: 50%; left: -3px;
      transform: translateY(-50%);
    }
    .ring.r2::before { width: 4px; height: 4px; opacity: 0.65; }

    /* ===== LOGO ===== */
    .logo-stage {
      position: relative;
      z-index: 10;
      perspective: 1600px;
      transform-style: preserve-3d;
    }

    .logo {
      position: relative;
      display: flex;
      align-items: center;
      gap: clamp(18px, 4vw, 36px);
      transform-style: preserve-3d;
      animation:
        introZoom 2.6s cubic-bezier(0.12, 1, 0.3, 1) forwards,
        breathe 4.6s ease-in-out 2.6s infinite,
        subtle3d 8s ease-in-out 2.6s infinite;
    }

    @keyframes introZoom {
      0% {
        opacity: 0;
        transform: scale(3.0) translateZ(240px) rotateX(14deg);
        filter: blur(18px) brightness(2.2);
      }
      40% {
        opacity: 1;
        filter: blur(4px) brightness(1.3);
      }
      80% {
        transform: scale(0.97) translateZ(10px) rotateX(0);
        filter: blur(0) brightness(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateZ(0) rotateX(0);
        filter: blur(0) brightness(1);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.03) translateY(-5px); }
    }

    @keyframes subtle3d {
      0%, 100% { transform: rotateY(-2.5deg) rotateX(1deg); }
      50% { transform: rotateY(3deg) rotateX(-1.5deg); }
    }

    /* ===== THE 3D SPHERE (self-rotating core) ===== */
    .sphere-wrap {
      position: relative;
      width: min(28vw, 168px);
      height: min(28vw, 168px);
      flex-shrink: 0;
      opacity: 0;
      animation: sphereIn 1.2s ease 1.4s forwards;
      transform-style: preserve-3d;
    }
    @keyframes sphereIn {
      from { opacity: 0; transform: scale(0.4) rotateY(-40deg); }
      to { opacity: 1; transform: scale(1) rotateY(0); }
    }

    /* Soft gray/silver aura ring (no rainbow, monochromatic premium) */
    .aura {
      position: absolute;
      inset: -30%;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #d0d8e8 0deg,
        #a8b4c8 60deg,
        #e8eef8 120deg,
        #90a0b8 180deg,
        #c8d0e0 240deg,
        #b0bcd0 300deg,
        #d0d8e8 360deg
      );
      filter: blur(18px);
      opacity: 0.5;
      animation: auraSpin 16s linear infinite, auraPulse 4.2s ease-in-out infinite;
      z-index: 1;
      mix-blend-mode: screen;
    }
    /* Soft second layer for depth */
    .aura::after {
      content: '';
      position: absolute;
      inset: 15%;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        #c0cce0, #e0e8f4, #a0b0c8, #d8e0f0, #c0cce0
      );
      filter: blur(12px);
      opacity: 0.4;
      animation: auraSpin 20s linear infinite reverse;
      mix-blend-mode: screen;
    }
    @keyframes auraSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes auraPulse {
      0%, 100% { opacity: 0.35; transform: scale(0.96); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }

    /* Soft outer glow */
    .sphere-glow {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,190,210,0.35) 0%, transparent 70%);
      filter: blur(12px);
      z-index: 0;
      animation: glowBreath 4s ease-in-out infinite;
    }
    @keyframes glowBreath {
      0%, 100% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    /* The glossy 3D ball itself - real logo sphere + living CSS rotation */
    .sphere {
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      background: 
        url('lucid_ball_only.png') center / cover no-repeat;
      box-shadow:
        inset -10px -14px 28px rgba(0,0,0,0.5),
        inset 8px 10px 20px rgba(180,190,210,0.1),
        0 0 35px rgba(160,170,190,0.3),
        0 0 70px rgba(120,130,150,0.15);
      z-index: 5;
      transform-style: preserve-3d;
      animation: sphereSpin 16s linear infinite;
      overflow: hidden;
    }

    /* Rotating light layer for continuous 3D self-rotation feel */
    .sphere::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255,255,255,0.22) 10%,
        transparent 22%,
        transparent 48%,
        rgba(180,210,255,0.15) 58%,
        transparent 72%,
        rgba(255,255,255,0.12) 85%,
        transparent 100%
      );
      animation: sphereSpin 16s linear infinite reverse;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    /* Moving specular flare */
    .sphere::after {
      content: '';
      position: absolute;
      width: 40%;
      height: 30%;
      top: 15%;
      left: 22%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.12) 50%, transparent 75%);
      filter: blur(0.8px);
      animation: flareMove 6.5s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes sphereSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes flareMove {
      0% { transform: translate(0, 0) scale(1); opacity: 0.75; }
      100% { transform: translate(16px, 10px) scale(1.15); opacity: 1; }
    }

    /* Extra tiny sparkle on the ball */
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px 3px #fff, 0 0 20px 6px rgba(180,190,210,0.6);
      top: 28%;
      left: 62%;
      z-index: 6;
      animation: sparkleTwinkle 2.4s ease-in-out infinite;
    }
    @keyframes sparkleTwinkle {
      0%, 100% { opacity: 0.7; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ===== TEXT ===== */
    .text-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      position: relative;
      animation: textIn 1.3s cubic-bezier(0.16,1,0.3,1) 1.65s forwards;
    }
    @keyframes textIn {
      0% { opacity: 0; transform: translateX(40px) scale(0.85); filter: blur(10px); letter-spacing: 0.4em; }
      60% { opacity: 1; filter: blur(0); }
      100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }

    .lucid {
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(38px, 8.5vw, 78px);
      letter-spacing: 0.12em;
      color: #d0d8e8;
      line-height: 1;
      position: relative;
      text-shadow:
        0 0 12px rgba(200, 210, 230, 0.5),
        0 0 28px rgba(170, 185, 210, 0.35),
        0 0 50px rgba(140, 155, 180, 0.2);
      animation: textGlow 2.8s ease-in-out 2.9s infinite;
    }

    /* Shine sweep across LUCID */
    .lucid::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 40%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      transform: skewX(-20deg);
      animation: shineSweep 4.5s ease-in-out 3.2s infinite;
      pointer-events: none;
    }
    @keyframes shineSweep {
      0%, 15% { left: -60%; opacity: 0; }
      30% { opacity: 1; }
      50% { left: 120%; opacity: 0; }
      100% { left: 120%; opacity: 0; }
    }

    .trading {
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: clamp(22px, 5vw, 44px);
      letter-spacing: 0.3em;
      color: #b0b8c8;
      line-height: 1;
      text-transform: uppercase;
      display: flex;
      align-items: baseline;
      gap: 2px;
      text-shadow:
        0 0 10px rgba(180, 190, 210, 0.3),
        0 0 24px rgba(150, 160, 180, 0.15);
      animation: tradingGlow 3.2s ease-in-out 3.1s infinite;
    }

    .tm {
      font-size: 0.45em;
      vertical-align: super;
      opacity: 0.75;
      letter-spacing: 0;
      margin-left: 1px;
    }

    @keyframes textGlow {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(190, 200, 220, 0.4),
          0 0 24px rgba(160, 175, 200, 0.25),
          0 0 48px rgba(130, 145, 170, 0.12);
        transform: scale(1);
      }
      50% {
        text-shadow:
          0 0 18px rgba(220, 230, 245, 0.7),
          0 0 40px rgba(180, 195, 220, 0.4),
          0 0 70px rgba(150, 165, 190, 0.2),
          0 0 100px rgba(120, 135, 160, 0.08);
        transform: scale(1.015);
      }
    }

    @keyframes tradingGlow {
      0%, 100% {
        text-shadow:
          0 0 8px rgba(170, 180, 200, 0.25),
          0 0 20px rgba(140, 150, 170, 0.12);
      }
      50% {
        text-shadow:
          0 0 14px rgba(200, 210, 230, 0.5),
          0 0 32px rgba(160, 175, 195, 0.25),
          0 0 50px rgba(130, 145, 165, 0.1);
      }
    }

    /* Attractive underline accent under text */
    .underline {
      position: absolute;
      bottom: -18px;
      left: 50%;
      width: 62%;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(200,210,230,0.3) 20%, 
        rgba(220,230,245,0.9) 50%, 
        rgba(200,210,230,0.3) 80%, 
        transparent 100%);
      border-radius: 2px;
      box-shadow: 
        0 0 10px rgba(180,190,210,0.6),
        0 0 25px rgba(160,170,190,0.3);
      transform: translateX(-50%) scaleX(0);
      animation: underlineIn 1.1s cubic-bezier(0.16,1,0.3,1) 2.25s forwards,
                 underlinePulse 3s ease-in-out 3.4s infinite;
    }
    @keyframes underlineIn {
      to { transform: translateX(-50%) scaleX(1); }
    }
    @keyframes underlinePulse {
      0%, 100% { opacity: 0.7; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.3); }
    }

    /* Responsive */
    @media (max-width: 560px) {
      .logo {
        flex-direction: column;
        gap: 22px;
        text-align: center;
      }
      .sphere-wrap {
        width: 140px;
        height: 140px;
      }
      .text-block {
        align-items: center;
      }
      .lucid { letter-spacing: 0.1em; }
      .trading { letter-spacing: 0.22em; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <canvas id="particles"></canvas>
    <div class="ambient"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>

    <div class="logo-stage">
      <div class="logo">
        <!-- Self-rotating 3D glossy sphere with iridescent aura -->
        <div class="sphere-wrap">
          <div class="sphere-glow"></div>
          <div class="aura"></div>
          <div class="sphere"></div>
          <div class="sparkle"></div>
        </div>

        <!-- Wordmark -->
        <div class="text-block">
          <div class="lucid">LUCID</div>
          <div class="trading">TRADING<span class="tm">™</span></div>
        </div>

        <div class="underline"></div>
      </div>
    </div>
  </div>

  <script>
    // More attractive particle system – denser, dynamic, elegant gray
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const COL = { r: 190, g: 200, b: 220 };

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    class P {
      constructor(early = false) {
        this.reset(early);
      }
      reset(early) {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        // more varied speed & direction for lively feel
        const speed = 0.15 + Math.random() * 0.55;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 0.08; // slight upward drift
        this.r = Math.random() * 2.6 + 0.5;
        this.a = Math.random() * 0.55 + 0.12;
        this.life = early ? Math.random() * 280 : 0;
        this.max = 180 + Math.random() * 280;
        this.phase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.02 + Math.random() * 0.04;
        // some particles are "bright stars"
        this.bright = Math.random() > 0.82;
      }
      step() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        this.phase += this.pulseSpeed;
        // soft wrap
        if (this.x < -30) this.x = W + 30;
        if (this.x > W + 30) this.x = -30;
        if (this.y < -30) this.y = H + 30;
        if (this.y > H + 30) this.y = -30;
        if (this.life > this.max) this.reset();
      }
      draw() {
        const fade = this.life < 40 ? this.life / 40 :
                     this.life > this.max - 50 ? (this.max - this.life) / 50 : 1;
        const pulse = 0.55 + 0.45 * Math.sin(this.phase);
        const alpha = this.a * fade * pulse;
        // main particle
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha})`;
        ctx.fill();
        // soft glow halo
        if (this.r > 1.1 || this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * (this.bright ? 3.8 : 2.8), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha * (this.bright ? 0.22 : 0.13)})`;
          ctx.fill();
        }
        // extra sparkle core for bright ones
        if (this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * 0.45, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
          ctx.fill();
        }
      }
    }

    // more particles for richer field
    const COUNT = Math.min(130, Math.floor(W * H / 12000));
    for (let i = 0; i < COUNT; i++) particles.push(new P(true));

    function connections() {
      // stronger, more elegant network
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = Math.hypot(dx, dy);
          if (d < 130) {
            const strength = (1 - d / 130);
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${COL.r},${COL.g},${COL.b},${strength * 0.14})`;
            ctx.lineWidth = 0.7 + strength * 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      // subtle vignette center pull
      particles.forEach(p => { p.step(); p.draw(); });
      connections();
      requestAnimationFrame(loop);
    }
    loop();

    // Stronger, more beautiful intro burst from the sphere
    setTimeout(() => {
      const cx = W / 2 - (W > 700 ? 90 : 40);
      const cy = H / 2;
      for (let i = 0; i < 36; i++) {
        const p = new P();
        p.x = cx + (Math.random() - 0.5) * 40;
        p.y = cy + (Math.random() - 0.5) * 40;
        const ang = Math.random() * Math.PI * 2;
        const sp = 1.4 + Math.random() * 3.2;
        p.vx = Math.cos(ang) * sp;
        p.vy = Math.sin(ang) * sp * 0.9;
        p.r = 1.6 + Math.random() * 2.8;
        p.a = 0.75 + Math.random() * 0.2;
        p.max = 70 + Math.random() * 70;
        p.bright = Math.random() > 0.5;
        particles.push(p);
      }
      // second wave for richer feel
      setTimeout(() => {
        for (let i = 0; i < 18; i++) {
          const p = new P();
          p.x = cx + (Math.random() - 0.5) * 60;
          p.y = cy + (Math.random() - 0.5) * 60;
          const ang = Math.random() * Math.PI * 2;
          const sp = 0.8 + Math.random() * 1.8;
          p.vx = Math.cos(ang) * sp;
          p.vy = Math.sin(ang) * sp;
          p.r = 1.2 + Math.random() * 2;
          p.a = 0.55;
          p.max = 90 + Math.random() * 60;
          particles.push(p);
        }
      }, 280);

      setTimeout(() => {
        particles = particles.filter(p => p.life < p.max - 8);
        while (particles.length < COUNT) particles.push(new P());
      }, 2000);
    }, 880);
  </script>
</body>
</html>
