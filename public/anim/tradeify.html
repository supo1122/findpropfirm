<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeify — Brand Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 85% 65% at 50% 48%, #060b14 0%, #000000 72%);
      overflow: hidden;
    }

    /* Tech grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 180, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 180, 255, 0.035) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, #000 18%, transparent 70%);
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    canvas#particles {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Ambient glow */
    .ambient {
      position: absolute;
      width: min(72vw, 600px);
      height: min(72vw, 600px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(80, 170, 255, 0.14) 0%, transparent 62%);
      filter: blur(55px);
      z-index: 2;
      animation: ambientBreath 5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ambientBreath {
      0%, 100% { transform: scale(0.88); opacity: 0.5; }
      50% { transform: scale(1.12); opacity: 0.95; }
    }

    /* Orbit rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(100, 180, 255, 0.12);
      z-index: 3;
      pointer-events: none;
    }
    .ring.r1 {
      width: min(90vw, 760px); height: min(90vw, 760px);
      animation: spin 32s linear infinite;
    }
    .ring.r2 {
      width: min(66vw, 540px); height: min(66vw, 540px);
      border-color: rgba(100, 180, 255, 0.08);
      animation: spin 46s linear infinite reverse;
    }
    .ring.r3 {
      width: min(46vw, 370px); height: min(46vw, 370px);
      border-color: rgba(100, 180, 255, 0.06);
      animation: spin 22s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .ring::before {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: #6eb6ff;
      border-radius: 50%;
      box-shadow: 0 0 16px 3px #4a9eff;
      top: 50%; left: -3.5px;
      transform: translateY(-50%);
    }
    .ring.r2::before { width: 5px; height: 5px; opacity: 0.7; }
    .ring.r3::before { width: 4px; height: 4px; opacity: 0.5; left: -2px; }

    /* ===== LOGO ===== */
    .logo-stage {
      position: relative;
      z-index: 10;
      perspective: 1400px;
      transform-style: preserve-3d;
    }

    .logo {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      transform-style: preserve-3d;
      transform-origin: center center;
      animation:
        introZoom 2.5s cubic-bezier(0.13, 1, 0.3, 1) forwards,
        breathe 4.5s ease-in-out 2.5s infinite,
        subtle3d 7.5s ease-in-out 2.5s infinite;
    }

    @keyframes introZoom {
      0% {
        opacity: 0;
        transform: scale(3.0) translateZ(250px) rotateX(15deg);
        filter: blur(18px) brightness(2.0);
      }
      40% {
        opacity: 1;
        filter: blur(4px) brightness(1.3);
      }
      78% {
        transform: scale(0.97) translateZ(12px) rotateX(0);
        filter: blur(0) brightness(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateZ(0) rotateX(0);
        filter: blur(0) brightness(1);
      }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.035) translateY(-5px); }
    }

    @keyframes subtle3d {
      0%, 100% { transform: rotateY(-2.5deg) rotateX(1.2deg); }
      50% { transform: rotateY(3deg) rotateX(-1.6deg); }
    }

    /* Icon container */
    .icon-wrap {
      position: relative;
      width: min(46vw, 250px);
      height: min(42vw, 230px);
      opacity: 0;
      animation: iconIn 1.15s ease 1.35s forwards;
      transform-origin: center center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    @keyframes iconIn {
      from { opacity: 0; transform: scale(0.55) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      filter: drop-shadow(0 0 20px rgba(100, 180, 255, 0.45))
              drop-shadow(0 0 45px rgba(70, 150, 255, 0.2));
      animation: iconGlow 3.2s ease-in-out 2.5s infinite;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: center center;
      display: block;
    }
    @keyframes iconGlow {
      0%, 100% {
        filter: drop-shadow(0 0 16px rgba(100, 180, 255, 0.4))
                drop-shadow(0 0 38px rgba(70, 150, 255, 0.18));
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(130, 200, 255, 0.7))
                drop-shadow(0 0 60px rgba(90, 170, 255, 0.35));
      }
    }

    /* Animated bars overlay for self-moving element (positioned over the icon bars) */
    .bars-overlay {
      position: absolute;
      left: 50%;
      top: 28%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 11px;
      height: 38%;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      animation: barsIn 0.9s ease 1.8s forwards;
    }
    @keyframes barsIn {
      from { opacity: 0; transform: translateX(-50%) scaleY(0.3); }
      to { opacity: 1; transform: translateX(-50%) scaleY(1); }
    }

    .bar {
      width: 14px;
      border-radius: 3px;
      background: linear-gradient(180deg, #9ed4ff 0%, #5ab0ff 50%, #2a80e0 100%);
      box-shadow: 0 0 12px rgba(90, 170, 255, 0.6);
      transform-origin: bottom center;
      animation: barDance 1.15s ease-in-out infinite;
    }
    .bar:nth-child(1) { height: 48%; animation-duration: 1.05s; animation-delay: 0.05s; }
    .bar:nth-child(2) { height: 100%; animation-duration: 1.25s; animation-delay: 0.18s; width: 15px; }
    .bar:nth-child(3) { height: 68%; animation-duration: 1.1s; animation-delay: 0.1s; }

    @keyframes barDance {
      0%, 100% { transform: scaleY(0.55); opacity: 0.85; }
      45% { transform: scaleY(1.12); opacity: 1; }
      70% { transform: scaleY(0.88); opacity: 0.95; }
    }

    /* Text */
    .word {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(38px, 9vw, 72px);
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1;
      user-select: none;
      text-shadow:
        0 0 22px rgba(120, 190, 255, 0.4),
        0 0 48px rgba(80, 160, 255, 0.18),
        0 3px 12px rgba(0,0,0,0.45);
      opacity: 0;
      animation: textIn 1.05s cubic-bezier(0.16,1,0.3,1) 1.7s forwards,
                 textGlow 3s ease-in-out 2.8s infinite;
    }
    @keyframes textIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(7px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes textGlow {
      0%, 100% {
        text-shadow:
          0 0 18px rgba(120, 190, 255, 0.35),
          0 0 40px rgba(80, 160, 255, 0.15),
          0 3px 12px rgba(0,0,0,0.45);
      }
      50% {
        text-shadow:
          0 0 30px rgba(150, 210, 255, 0.65),
          0 0 60px rgba(100, 180, 255, 0.3),
          0 0 90px rgba(70, 150, 255, 0.12),
          0 3px 12px rgba(0,0,0,0.45);
      }
    }

    /* Underline */
    .underline {
      position: absolute;
      bottom: -16px;
      left: 50%;
      width: 55%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(100,180,255,0.85), transparent);
      border-radius: 2px;
      box-shadow: 0 0 14px rgba(90,170,255,0.6);
      transform: translateX(-50%) scaleX(0);
      animation: underlineIn 1s cubic-bezier(0.16,1,0.3,1) 2.2s forwards;
    }
    @keyframes underlineIn {
      to { transform: translateX(-50%) scaleX(1); }
    }

    /* Responsive */
    @media (max-width: 520px) {
      .icon-wrap { width: 170px; height: 155px; }
      .word { font-size: 36px; }
      .logo { gap: 14px; }
      .bars-overlay { gap: 8px; }
      .bar { width: 11px; }
    }
  </style>
</head>

  <script>
    // Attractive particle system
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    const COL = { r: 110, g: 185, b: 255 };

    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    class P {
      constructor(early = false) {
        this.reset(early);
      }
      reset(early) {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        const speed = 0.18 + Math.random() * 0.5;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 0.07;
        this.r = Math.random() * 2.4 + 0.5;
        this.a = Math.random() * 0.5 + 0.12;
        this.life = early ? Math.random() * 260 : 0;
        this.max = 190 + Math.random() * 260;
        this.phase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.022 + Math.random() * 0.035;
        this.bright = Math.random() > 0.8;
      }
      step() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        this.phase += this.pulseSpeed;
        if (this.x < -25) this.x = W + 25;
        if (this.x > W + 25) this.x = -25;
        if (this.y < -25) this.y = H + 25;
        if (this.y > H + 25) this.y = -25;
        if (this.life > this.max) this.reset();
      }
      draw() {
        const fade = this.life < 40 ? this.life / 40 :
                     this.life > this.max - 45 ? (this.max - this.life) / 45 : 1;
        const pulse = 0.55 + 0.45 * Math.sin(this.phase);
        const alpha = this.a * fade * pulse;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha})`;
        ctx.fill();
        if (this.r > 1.15 || this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * (this.bright ? 3.5 : 2.6), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${COL.r},${COL.g},${COL.b},${alpha * (this.bright ? 0.2 : 0.12)})`;
          ctx.fill();
        }
        if (this.bright) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha * 0.85})`;
          ctx.fill();
        }
      }
    }

    const COUNT = Math.min(120, Math.floor(W * H / 13000));
    for (let i = 0; i < COUNT; i++) particles.push(new P(true));

    function connections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = Math.hypot(dx, dy);
          if (d < 125) {
            const s = 1 - d / 125;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${COL.r},${COL.g},${COL.b},${s * 0.13})`;
            ctx.lineWidth = 0.65 + s * 0.45;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.step(); p.draw(); });
      connections();
      requestAnimationFrame(loop);
    }
    loop();

    // Beautiful intro burst from icon
    setTimeout(() => {
      const cx = W / 2, cy = H / 2 - 40;
      for (let i = 0; i < 32; i++) {
        const p = new P();
        p.x = cx + (Math.random() - 0.5) * 50;
        p.y = cy + (Math.random() - 0.5) * 50;
        const ang = Math.random() * Math.PI * 2;
        const sp = 1.3 + Math.random() * 3.0;
        p.vx = Math.cos(ang) * sp;
        p.vy = Math.sin(ang) * sp * 0.9;
        p.r = 1.5 + Math.random() * 2.6;
        p.a = 0.7 + Math.random() * 0.25;
        p.max = 75 + Math.random() * 65;
        p.bright = Math.random() > 0.45;
        particles.push(p);
      }
      setTimeout(() => {
        for (let i = 0; i < 16; i++) {
          const p = new P();
          p.x = cx + (Math.random() - 0.5) * 70;
          p.y = cy + (Math.random() - 0.5) * 70;
          const ang = Math.random() * Math.PI * 2;
          const sp = 0.7 + Math.random() * 1.6;
          p.vx = Math.cos(ang) * sp;
          p.vy = Math.sin(ang) * sp;
          p.r = 1.1 + Math.random() * 1.8;
          p.a = 0.5;
          p.max = 100 + Math.random() * 50;
          particles.push(p);
        }
      }, 260);
      setTimeout(() => {
        particles = particles.filter(p => p.life < p.max - 6);
        while (particles.length < COUNT) particles.push(new P());
      }, 1900);
    }, 900);
  </script>
